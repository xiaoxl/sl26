    #   chapters:
    #   - contents/4/vs.qmd
      # - contents/4/ra.qmd
  appendices:
  #   - contents/app/data.qmd
    - contents/app/r.qmd
  #   - contents/app/hypo.qmd
  sidebar:
    style: "docked"
    # pinned: true
    # align: center
    # border: true
    search: true
    collapse-level: 1
    # alignment: "center"
  # navbar: 
  #   background: primary
  #   search: true
  #   left: 
  #     - text: "Home"
  #       menu: 
  #       - contents/index.qmd
  page-navigation: true
  bread-crumbs: false
  search: true
  reader-mode: true
   

format:
  html:
    toc: true
    toc-depth: 3
    theme:
      light:
        - styles/light.scss
      dark:
        - styles/light.scss
        - styles/dark.scss
    css:
      - styles/fonts.css
      - styles/blocks.css

    mainfont: Noto Serif
    sansfont: Noto Sans
    # mainfont: Libertinus Serif
    # sansfont: Libertinus Sans

    mathfont: Libertinus Math
    monofont: JetBrains Mono
    # # monofont: Latin Modern Mono
    monofontoptions:
      - Scale=0.95

    fontsize: 12pt
    # linestretch: 1.1

    code-annotations: select
    code-overflow: scroll
    code-block-bg: true
    code-block-border-left: true #"#31BAE9"
    # code-line-numbers: true
    highlight-style: atom-one
    page-layout: article

