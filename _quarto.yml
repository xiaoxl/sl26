project:
  type: book
  output-dir: docs
  resources:
    - fonts/

number-sections: true
# top-level-division: part
toc-depth: 3
number-depth: 4
bibliography: reference.bib
csl: "ims.csl"
 
crossref:
  labels: arabic        # (default is arabic)
  subref-labels: roman i # (default is alpha a)
 
execute:
  freeze: auto

knitr:
  opts_chunk:
    # comment: "#>"
    collapse: false

jupyter: stats

 
book:
  title: "Statistical Learning"
  author: "Xinli Xiao"
  date: last-modified
  chapters: 
    - index.qmd
    - part: "Regression"
      chapters:
      - contents/1/basic.qmd
      - contents/1/lr.qmd
      - contents/1/glm.qmd
      - contents/1/gam.qmd
      - contents/1/ridge.qmd      
      - contents/1/lasso.qmd
    # - part: "Simple Linear regression"
    #   chapters: 
